# Next.js su Netlify: NON usare la root come publish directory.
# In Netlify UI → Build settings → Publish directory → lascia VUOTO
# oppure imposta esplicitamente: .next (se "Not set" usa la root e il build fallisce)

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Proxy helper OAuth Firebase sullo stesso dominio (Safari/Chrome M115+)
[[redirects]]
  from = "/__/auth/*"
  to = "https://card-spottly.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://card-spottly.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true
